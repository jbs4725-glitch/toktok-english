<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>톡톡영어 — Sunny와 5분 통화</title>
<meta name="description" content="Sunny와 하루 5분 영어회화 — 오늘의 표현, 대화 듣기, 롤플레이, 퀴즈, 나만의 상황 만들기까지 핸드폰으로.">
<meta property="og:title" content="톡톡영어 — Sunny와 5분 통화">
<meta property="og:description" content="Sunny와 하루 5분 영어회화 — 원하는 상황을 직접 만들어 연습하세요.">
<meta name="theme-color" content="#fff9f1">
</head>
<body>
<style>
  :root{
    --bg:#fff3e2; --ink:#4a3524; --head:#6f4322; --sub:#8f6a4a; --muted:#b3906e; --line:#f3ddc4;
    --card:rgba(255,252,247,.9); --accent:#ee7433; --accent-deep:#d05a1e; --accent-soft:#ffe9d6;
    --grad:linear-gradient(135deg,#ffb25e,#ee7433);
    --red:#d64040; --green:#2c6b3a; --gold:#c98a16;
    --shadow:0 6px 20px rgba(90,50,15,.1);
    --font-kr:-apple-system,"Apple SD Gothic Neo","Pretendard","Noto Sans KR","Malgun Gothic",sans-serif;
    --font-en:ui-rounded,"SF Pro Rounded",-apple-system,"Segoe UI",sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:#ffedd8}
  body{font-family:var(--font-kr);color:var(--ink);line-height:1.55;font-size:16px;
    background:linear-gradient(170deg,#fff9f1,#ffedd8 55%,#ffdfc0) fixed}
  button{font-family:inherit;font-size:inherit;color:inherit;border:0;background:none;cursor:pointer;padding:0}
  #frame{max-width:430px;margin:0 auto;min-height:100dvh;position:relative}
  @media (min-width:500px){ #frame{border-left:1px solid var(--line);border-right:1px solid var(--line)} }

  .screen{display:none;padding:20px 20px calc(84px + env(safe-area-inset-bottom));min-height:100dvh}
  .screen.on{display:block}

  /* ---------- top bar ---------- */
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
  .brand{font-weight:800;font-size:20px;letter-spacing:-.02em;color:var(--head)}
  .brand em{font-style:normal;color:var(--accent)}
  .streak{display:flex;align-items:center;gap:6px;background:var(--card);
    border-radius:999px;padding:6px 12px;font-size:13px;font-weight:700;color:var(--sub);box-shadow:var(--shadow)}
  .streak b{color:var(--accent-deep);font-variant-numeric:tabular-nums}

  /* ---------- call card (hero) ---------- */
  .callcard{background:var(--card);border-radius:30px;padding:20px 20px 18px;
    margin-bottom:24px;position:relative;overflow:hidden;box-shadow:0 10px 30px rgba(90,50,15,.14)}
  .callcard::before{content:"";position:absolute;left:-30px;bottom:-46px;width:110px;height:110px;
    border-radius:50%;background:var(--accent-soft);opacity:.75}
  .callcard::after{content:"";position:absolute;left:62px;bottom:-58px;width:78px;height:78px;
    border-radius:50%;background:var(--accent-soft);opacity:.5}
  .callcard>*{position:relative;z-index:1}
  .call-row{display:flex;align-items:center;gap:8px;margin-bottom:14px}
  .cc-txt{flex:1;min-width:0}
  .cc-knock{display:inline-block;background:var(--accent-soft);color:var(--accent-deep);
    font-size:12px;font-weight:800;border-radius:999px;padding:3px 10px;margin-bottom:8px;
    animation:wiggle 2.8s ease-in-out infinite;transform-origin:50% 100%}
  @keyframes wiggle{0%,70%,100%{transform:rotate(0)}76%{transform:rotate(-4deg)}82%{transform:rotate(4deg)}88%{transform:rotate(-2deg)}94%{transform:rotate(0)}}
  @media (prefers-reduced-motion:reduce){ .cc-knock{animation:none} }
  .call-name{font-weight:800;font-size:20px;color:var(--head)}
  .call-status{font-size:13px;color:var(--sub)}
  .call-topic{font-size:14px;color:var(--sub);margin-top:10px}
  .call-topic b{font-size:15.5px;color:var(--head)}
  .cc-emma{width:128px;height:128px;flex:none;object-fit:contain;margin:-6px -20px -10px 0;
    filter:drop-shadow(0 10px 20px rgba(90,50,15,.25));animation:bob 3s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-7px) rotate(1deg)}}
  @media (prefers-reduced-motion:reduce){ .cc-emma{animation:none} }
  .btn-call{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;
    background:var(--grad);color:#fff;font-weight:800;font-size:17px;
    border-radius:20px;padding:15px;transition:transform .08s,box-shadow .08s;
    box-shadow:0 4px 0 #c9541c, 0 10px 22px rgba(238,116,51,.35)}
  .btn-call:active{transform:translateY(3px);box-shadow:0 1px 0 #c9541c, 0 4px 10px rgba(238,116,51,.3)}
  .btn-call svg{flex:none}

  /* ---------- session list ---------- */
  .sec-label{font-size:13px;font-weight:800;letter-spacing:.08em;color:var(--sub);
    text-transform:uppercase;margin:0 0 10px 4px}
  .slist{display:flex;flex-direction:column;gap:10px}
  .srow{display:flex;align-items:center;gap:14px;background:var(--card);
    border-radius:22px;padding:14px 16px;text-align:left;width:100%;transition:transform .1s;box-shadow:var(--shadow)}
  .srow:active{transform:scale(.98)}
  .snum{width:42px;height:42px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;
    background:var(--accent-soft);color:var(--accent-deep);font-weight:800;font-size:14.5px;
    font-variant-numeric:tabular-nums}
  .srow.done .snum{background:var(--grad);color:#fff}
  .srow-t{font-weight:700;font-size:15.5px;color:var(--head)}
  .srow-d{font-size:13px;color:var(--sub)}
  .srow-tag{margin-left:auto;flex:none;font-size:11.5px;font-weight:700;color:var(--sub);
    border:1px solid var(--line);border-radius:999px;padding:3px 9px}
  .srow.done .srow-tag{color:var(--accent-deep);border-color:var(--accent-soft);background:var(--accent-soft)}

  /* ---------- bottom nav ---------- */
  nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;
    background:rgba(255,250,244,.94);backdrop-filter:blur(12px);border-top:1px solid var(--line);
    display:flex;padding:8px 10px calc(8px + env(safe-area-inset-bottom));z-index:40}
  nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
    font-size:11px;font-weight:700;color:var(--muted);padding:6px 0;border-radius:12px}
  nav button.on{color:var(--accent-deep)}
  nav button svg{width:23px;height:23px}
  nav.hidden{display:none}

  /* ---------- session player ---------- */
  #sess{padding:0 0 calc(20px + env(safe-area-inset-bottom))}
  .shead{position:sticky;top:0;z-index:30;background:rgba(255,249,241,.94);backdrop-filter:blur(10px);
    padding:14px 16px 10px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--line)}
  .btn-x{width:38px;height:38px;border-radius:12px;background:var(--card);box-shadow:var(--shadow);
    display:flex;align-items:center;justify-content:center;flex:none;color:var(--head)}
  .shead-t{font-weight:800;font-size:16px;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--head)}
  .timer{display:flex;align-items:center;gap:7px;flex:none}
  .timer svg{transform:rotate(-90deg)}
  .timer-txt{font-size:13px;font-weight:800;color:var(--accent-deep);font-variant-numeric:tabular-nums;min-width:38px}
  .timer.over .timer-txt{color:var(--red)}
  .steps{display:flex;gap:6px;padding:12px 20px 4px}
  .steps i{flex:1;height:7px;border-radius:4px;background:#f6e0c8;transition:background .2s}
  .steps i.on{background:var(--grad)}
  .step-label{padding:10px 20px 2px;font-size:13px;font-weight:800;letter-spacing:.06em;color:var(--accent-deep)}
  .sbody{padding:8px 20px 20px}

  /* expressions step */
  .expcard{background:var(--card);border-radius:26px;padding:20px;margin-bottom:14px;box-shadow:var(--shadow)}
  .exp-en{font-family:var(--font-en);font-weight:800;font-size:21px;line-height:1.35;letter-spacing:-.01em;
    text-wrap:balance;margin-bottom:6px;color:var(--head)}
  .exp-ko{font-size:15px;color:var(--sub);margin-bottom:12px}
  .exp-note{font-size:13.5px;background:var(--accent-soft);color:var(--accent-deep);
    border-radius:12px;padding:10px 12px;margin-bottom:12px}
  .exp-ex{border-top:1px dashed var(--line);padding-top:12px;font-size:14px}
  .exp-ex .en{font-family:var(--font-en);font-weight:600}
  .exp-ex .ko{color:var(--sub);font-size:13px}
  .btn-listen{display:inline-flex;align-items:center;gap:7px;background:var(--grad);color:#fff;
    font-weight:700;font-size:14px;border-radius:999px;padding:9px 16px;margin-top:4px;
    box-shadow:0 4px 14px rgba(238,116,51,.35)}
  .btn-listen:active{opacity:.85}
  .btn-listen.playing{background:#a8492a;box-shadow:none}

  /* dialogue step */
  .chat{display:flex;flex-direction:column;gap:12px;padding-bottom:8px}
  .msg{max-width:82%;display:flex;flex-direction:column;gap:3px}
  .msg .who{font-size:11.5px;font-weight:800;color:var(--sub);letter-spacing:.04em;margin:0 6px}
  .bubble{border-radius:22px;padding:11px 15px;font-family:var(--font-en);font-weight:600;
    font-size:16px;line-height:1.45;cursor:pointer}
  .msg.e{align-self:flex-start}
  .msg.e .bubble{background:#fffcf7;box-shadow:var(--shadow);border-bottom-left-radius:6px;color:var(--ink)}
  .msg.y{align-self:flex-end;align-items:flex-end}
  .msg.y .bubble{background:var(--accent-soft);border:1px solid #f9d0a8;border-bottom-right-radius:6px;color:#7c4a1e}
  .msg .ko{font-family:var(--font-kr);font-weight:400;font-size:12.5px;color:var(--sub);margin:0 6px}
  .msg.speaking .bubble{box-shadow:0 0 0 2px var(--accent)}
  .playall{position:sticky;bottom:12px;display:flex;justify-content:center;margin-top:16px}
  .playall button{display:flex;align-items:center;gap:8px;background:#3f2a18;color:#ffedd8;
    font-weight:700;font-size:14.5px;border-radius:999px;padding:12px 22px;box-shadow:0 6px 18px rgba(40,25,12,.3)}
  .playall button.playing{background:var(--red)}

  /* roleplay step */
  .rp-stage{display:flex;flex-direction:column;gap:12px;min-height:200px}
  .rp-hint{font-size:13.5px;color:var(--sub);text-align:center;padding:4px 10px 10px}
  .rp-you{background:#fffcf7;border:2.5px solid var(--accent);border-radius:26px;padding:18px;box-shadow:var(--shadow)}
  .rp-you .lab{font-size:12px;font-weight:800;color:var(--accent-deep);letter-spacing:.06em;margin-bottom:6px}
  .rp-ko{font-size:15.5px;font-weight:700;margin-bottom:14px;color:var(--head)}
  .rp-en{font-family:var(--font-en);font-weight:800;font-size:19px;color:var(--accent-deep);
    margin-bottom:8px;display:none}
  .rp-you.revealed .rp-en{display:block}
  .rp-acts{display:flex;gap:8px;flex-wrap:wrap}
  .chipbtn{border:1.5px solid #f0d2b2;background:#fffcf7;border-radius:999px;
    padding:9px 16px;font-size:14px;font-weight:700;color:var(--head)}
  .chipbtn.primary{background:var(--grad);border-color:transparent;color:#fff;box-shadow:0 4px 14px rgba(238,116,51,.35)}
  .chipbtn.rec{border-color:var(--red);color:var(--red)}
  .chipbtn.rec.live{background:var(--red);color:#fff;animation:pulse 1.2s infinite}
  @keyframes pulse{50%{opacity:.65}}
  @media (prefers-reduced-motion:reduce){ .chipbtn.rec.live{animation:none} }
  .rp-fb{font-size:14px;font-weight:700;margin-top:10px;display:none}
  .rp-fb.good{display:block;color:var(--green)}
  .rp-fb.retry{display:block;color:var(--red)}
  .rp-heard{font-size:12.5px;color:var(--sub);font-weight:400}

  /* quiz step */
  .qz-q{font-size:17px;font-weight:800;margin:6px 0 16px;text-wrap:balance;color:var(--head)}
  .qz-opts{display:flex;flex-direction:column;gap:10px}
  .qz-opt{background:#fffcf7;border:1.5px solid #f0d2b2;border-radius:20px;
    padding:14px 16px;text-align:left;font-family:var(--font-en);font-weight:600;font-size:15.5px}
  .qz-opt.ok{border-color:var(--green);background:#e9f3e6;color:var(--green)}
  .qz-opt.no{border-color:var(--red);color:var(--red)}
  .qz-prog{font-size:13px;font-weight:700;color:var(--sub);margin-bottom:4px;font-variant-numeric:tabular-nums}

  /* done step */
  .done-wrap{text-align:center;padding:24px 10px 10px}
  .done-emma{width:150px;height:150px;object-fit:contain;display:block;margin:0 auto 10px;
    filter:drop-shadow(0 12px 24px rgba(90,50,15,.25))}
  .done-t{font-size:21px;font-weight:800;margin-bottom:6px;color:var(--head)}
  .done-d{font-size:14.5px;color:var(--sub);margin-bottom:22px}
  .done-exps{text-align:left;background:var(--card);border-radius:24px;
    padding:16px 18px;margin-bottom:22px;box-shadow:var(--shadow)}
  .done-exps .en{font-family:var(--font-en);font-weight:700;font-size:15.5px;color:var(--head)}
  .done-exps .ko{font-size:13px;color:var(--sub);margin-bottom:10px}

  /* footer buttons in session */
  .sfoot{padding:6px 20px 12px;display:flex;gap:10px}
  .btn-main{flex:1;background:var(--grad);color:#fff;font-weight:800;font-size:16.5px;
    border-radius:20px;padding:15px;transition:transform .08s,box-shadow .08s;
    box-shadow:0 4px 0 #c9541c, 0 10px 22px rgba(238,116,51,.35)}
  .btn-main:active{transform:translateY(3px);box-shadow:0 1px 0 #c9541c, 0 4px 10px rgba(238,116,51,.3)}
  .btn-main:disabled{background:#f6e0c8;color:var(--muted);box-shadow:none}
  .btn-ghost{flex:none;background:#fffcf7;border:1.5px solid #f0d2b2;color:var(--head);
    font-weight:700;border-radius:16px;padding:15px 18px}

  /* ---------- review ---------- */
  .rev-empty{text-align:center;color:var(--sub);padding:60px 20px;font-size:14.5px}
  .rev-group{margin-bottom:20px}
  .rev-group h3{font-size:14px;margin:0 4px 8px;color:var(--sub);font-weight:800}
  .rev-item{display:flex;align-items:center;gap:12px;background:var(--card);
    border-radius:20px;padding:13px 15px;margin-bottom:8px;width:100%;text-align:left;box-shadow:var(--shadow)}
  .rev-item .en{font-family:var(--font-en);font-weight:700;font-size:15.5px;color:var(--head)}
  .rev-item .ko{font-size:12.5px;color:var(--sub)}
  .rev-play{margin-left:auto;flex:none;width:36px;height:36px;border-radius:50%;
    background:var(--accent-soft);color:var(--accent-deep);display:flex;align-items:center;justify-content:center}

  /* ---------- settings ---------- */
  .set-card{background:var(--card);border-radius:24px;padding:4px 18px;margin-bottom:16px;box-shadow:var(--shadow)}
  .set-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:15px 0;border-bottom:1px solid var(--line)}
  .set-row:last-child{border-bottom:0}
  .set-t{font-weight:700;font-size:15px;color:var(--head)}
  .set-d{font-size:12.5px;color:var(--sub)}
  .toggle{width:50px;height:30px;border-radius:999px;background:#f0d6b6;position:relative;flex:none;transition:background .15s}
  .toggle.on{background:var(--accent)}
  .toggle i{position:absolute;top:3px;left:3px;width:24px;height:24px;border-radius:50%;background:#fff;
    transition:left .15s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
  .toggle.on i{left:23px}
  .seg{display:flex;gap:6px;flex:none}
  .seg button{border:1.5px solid #f0d2b2;border-radius:10px;padding:7px 12px;font-size:13.5px;font-weight:700;color:var(--sub)}
  .seg button.on{border-color:var(--accent);background:var(--accent-soft);color:var(--accent-deep)}
  select{font-family:inherit;font-size:14px;padding:8px 10px;border-radius:10px;border:1.5px solid #f0d2b2;
    background:#fffcf7;color:var(--ink);max-width:180px}
  .btn-danger{width:100%;text-align:center;color:var(--red);font-weight:700;font-size:14.5px;padding:14px}
  .set-note{font-size:12.5px;color:var(--muted);margin:4px 6px 0}

  /* ---------- situation maker ---------- */
  .srow.make{background:transparent;border:2px dashed #f0d2b2;box-shadow:none;justify-content:center;
    color:var(--accent-deep);font-weight:800;font-size:15px;padding:16px}
  .make-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .make-card{background:#fffcf7;border:1.5px solid #f0d2b2;border-radius:20px;padding:14px;text-align:left}
  .make-card.on{border-color:var(--accent);background:var(--accent-soft)}
  .make-card b{display:block;font-size:15px;color:var(--head);margin-bottom:3px}
  .make-card span{font-size:12px;color:var(--sub);line-height:1.45;display:block}
  .slot{margin-top:20px}
  .slot-label{font-weight:800;font-size:14.5px;color:var(--head);margin-bottom:9px}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{border:1.5px solid #f0d2b2;background:#fffcf7;border-radius:999px;padding:8px 14px;
    font-size:13.5px;font-weight:600;color:var(--ink)}
  .chip.on{border-color:var(--accent);background:var(--accent-soft);color:var(--accent-deep)}
  .slot-en{font-size:13px;color:var(--accent-deep);margin-top:8px;font-family:var(--font-en);font-weight:700}
  .free-in{margin-top:9px;width:100%;padding:11px 12px;border:1.5px solid #f0d2b2;border-radius:12px;
    font-size:16px;background:#fffcf7;color:var(--ink);font-family:var(--font-kr)}
  .free-in::placeholder{color:var(--muted)}
  .make-note{font-size:12.5px;color:var(--muted);margin-top:6px}
  .srow-del{margin-left:auto;flex:none;font-size:12px;font-weight:800;color:var(--muted);
    border:1.5px solid #f0d2b2;border-radius:999px;padding:5px 11px}
  .srow-del.armed{color:#fff;background:var(--red);border-color:var(--red)}

  .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(100px + env(safe-area-inset-bottom));
    background:#3f2a18;color:#ffedd8;font-size:13.5px;font-weight:700;border-radius:999px;
    padding:10px 18px;opacity:0;visibility:hidden;pointer-events:none;transition:opacity .2s;z-index:60;white-space:nowrap}
  .toast.show{opacity:1;visibility:visible}
</style>

<div id="frame">

  <!-- ============ HOME ============ -->
  <section class="screen on" id="scr-home">
    <div class="topbar">
      <div class="brand">톡톡<em>영어</em></div>
      <div class="streak">연속 <b id="streakN">0</b>일</div>
    </div>

    <div class="callcard">
      <div class="call-row">
        <div class="cc-txt">
          <span class="cc-knock">똑똑 —</span>
          <div class="call-name">Sunny</div>
          <div class="call-status" id="callStatus">지금 통화할 수 있어요</div>

/* ================= STATE ================= */
const store = {
  get(k, d){ try{ const v = localStorage.getItem('fme_'+k); return v===null ? d : JSON.parse(v); }catch(e){ return d; } },
  set(k, v){ try{ localStorage.setItem('fme_'+k, JSON.stringify(v)); }catch(e){} }
};
let doneIds   = store.get('done', []);
let customs   = store.get('custom', []);    // 사용자가 만든 세션
let learned   = store.get('learned', []);   // [{sid, stitle, en, ko}]
let streak    = store.get('streak', 0);
let lastDay   = store.get('lastDay', '');
let rate      = store.get('rate', 1);
let showKo    = store.get('showKo', true);
let voiceName = store.get('voice', '');

const $  = s => document.querySelector(s);
const $$ = s => Array.from(document.querySelectorAll(s));

/* ================= SPEECH ================= */
const synth = window.speechSynthesis || null;
let voices = [];
function loadVoices(){
  if(!synth) return;
  voices = synth.getVoices().filter(v => v.lang && v.lang.toLowerCase().startsWith('en'));
  const sel = $('#voiceSel');
  sel.innerHTML = '';
  if(!voices.length){
    const o = document.createElement('option'); o.textContent = '자동'; sel.appendChild(o); return;
  }
  voices.forEach(v=>{
    const o = document.createElement('option');
    o.value = v.name; o.textContent = v.name.replace(/\(.*\)/,'').trim();
    if(v.name === voiceName) o.selected = true;
    sel.appendChild(o);
  });
  if(!voiceName){
    const pref = voices.find(v=>/samantha|zira|aria|jenny|female|google us english/i.test(v.name)) || voices[0];
    if(pref){ voiceName = pref.name; $('#voiceSel').value = pref.name; }
  }
}
if(synth){ loadVoices(); synth.onvoiceschanged = loadVoices; }

let onSpeakEnd = null, speakGuard = null;
function speak(text, cb){
  if(!synth){ if(cb) cb(); return; }
  synth.cancel();
  if(speakGuard){ clearTimeout(speakGuard); speakGuard = null; }
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US'; u.rate = rate;
  const v = voices.find(x=>x.name===voiceName); if(v) u.voice = v;
  onSpeakEnd = cb || null;
  const finish = ()=>{
    if(speakGuard){ clearTimeout(speakGuard); speakGuard = null; }
    const f = onSpeakEnd; onSpeakEnd = null; if(f) f();
  };
  u.onend = u.onerror = finish;
  // 일부 기기에서 onend가 오지 않는 경우 대비: 넉넉한 예상 재생시간 후 강제 종료
  speakGuard = setTimeout(finish, Math.max(2500, text.length*120/rate + 3000));
  synth.speak(u);
}
function stopSpeak(){
  onSpeakEnd = null;
  if(speakGuard){ clearTimeout(speakGuard); speakGuard = null; }
  if(synth) synth.cancel();
}

const SR = window.SpeechRecognition || window.webkitSpeechRecognition || null;

/* ================= NAV ================= */
function show(scr){
  $$('.screen').forEach(s=>s.classList.remove('on'));
  $('#scr-'+scr).classList.add('on');
  $$('#nav button').forEach(b=>b.classList.toggle('on', b.dataset.scr===scr));
  $('#nav').classList.toggle('hidden', scr==='sess' || scr==='make');
  window.scrollTo(0,0);
  if(scr==='home') renderHome();
  if(scr==='rev')  renderReview();
}
$$('#nav button').forEach(b=> b.addEventListener('click', ()=>{ stopSpeak(); show(b.dataset.scr); }));

function toast(msg){
  const t = $('#toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(toast._t); toast._t = setTimeout(()=>t.classList.remove('show'), 2200);
}

/* ================= HOME ================= */
function todaySession(){ return SESSIONS.find(s=>!doneIds.includes(s.id)) || SESSIONS[0]; }
function findSession(id){ return SESSIONS.find(s=>s.id===id) || customs.find(s=>s.id===id); }
function renderHome(){
  $('#streakN').textContent = streak;
  const t = todaySession();
  $('#todayTitle').textContent = t.title;
  const h = new Date().getHours();
  $('#callStatus').textContent = h<12 ? '좋은 아침이에요! 통화할까요?' : h<18 ? '지금 통화할 수 있어요' : '자기 전 5분, 어때요?';
  const list = $('#sessionList'); list.innerHTML = '';
  SESSIONS.forEach((s,i)=>{
    const done = doneIds.includes(s.id);
    const b = document.createElement('button');
    b.className = 'srow'+(done?' done':'');
    b.innerHTML = `<span class="snum">${done?'✓':String(i+1).padStart(2,'0')}</span>
      <span><span class="srow-t">${s.title}</span><br><span class="srow-d">${s.desc}</span></span>
      <span class="srow-tag">${done?'완료':s.tag}</span>`;
    b.addEventListener('click', ()=>openSession(s));
    list.appendChild(b);
  });
  renderCustomList();
}
function renderCustomList(){
  const sec = $('#customSec'), list = $('#customList');
  sec.style.display = customs.length ? '' : 'none';
  list.innerHTML = '';
  customs.forEach(s=>{
    const done = doneIds.includes(s.id);
    const b = document.createElement('button');
    b.className = 'srow'+(done?' done':'');
    b.innerHTML = `<span class="snum">${done?'✓':'MY'}</span>
      <span><span class="srow-t">${s.title}</span><br><span class="srow-d">${s.desc}</span></span>`;
    const del = document.createElement('span');
    del.className = 'srow-del'; del.textContent = '삭제'; del.setAttribute('role','button');
    del.addEventListener('click', ev=>{
      ev.stopPropagation();
      if(!del.classList.contains('armed')){
        del.classList.add('armed'); del.textContent = '한 번 더';
        setTimeout(()=>{ del.classList.remove('armed'); del.textContent='삭제'; }, 2500);
        return;
      }
      customs = customs.filter(x=>x.id!==s.id);
      doneIds = doneIds.filter(x=>x!==s.id);
      store.set('custom', customs); store.set('done', doneIds);
      toast('세션을 삭제했어요');
      renderHome();
    });
    b.appendChild(del);
    b.addEventListener('click', ()=>openSession(s));
    list.appendChild(b);
  });
}
$('#btnCall').addEventListener('click', ()=>openSession(todaySession()));
$('#btnMake').addEventListener('click', ()=>{ renderMake(); show('make'); });
$('#btnMakeBack').addEventListener('click', ()=>show('home'));

/* ================= SITUATION MAKER ================= */
const clean = s => s.replace(/[<>&"']/g,'').trim();
let makeArch = null, makeVals = {};
function renderMake(){
  makeArch = null; makeVals = {};
  const grid = $('#archGrid'); grid.innerHTML = '';
  $('#slotArea').innerHTML = ''; $('#makeFoot').style.display = 'none'; $('#makeTitle').value = '';
  ARCHES.forEach(a=>{
    const c = document.createElement('button');
    c.className = 'make-card';
    c.innerHTML = `<b>${a.name}</b><span>${a.desc}</span>`;
    c.addEventListener('click', ()=>{
      makeArch = a;
      $$('#archGrid .make-card').forEach(x=>x.classList.remove('on'));
      c.classList.add('on');
      renderSlots(a);
    });
    grid.appendChild(c);
  });
}
function chipLabel(ch){ return ch.ko + (ch.en ? '' : ''); }
function chipEn(ch){ return ch.say || ch.en || ''; }
function renderSlots(a){
  const area = $('#slotArea'); area.innerHTML = '';
  makeVals = {};
  a.slots.forEach(slot=>{
    const box = document.createElement('div'); box.className = 'slot';
    box.innerHTML = `<div class="slot-label">${slot.label}</div>`;
    const chips = document.createElement('div'); chips.className = 'chips';
    const enLine = document.createElement('div'); enLine.className = 'slot-en';
    const setVal = v => { makeVals[slot.key] = v; enLine.textContent = '→ ' + chipEn(v); };
    slot.chips.forEach((ch,i)=>{
      const el = document.createElement('button');
      el.className = 'chip'; el.textContent = chipLabel(ch);
      el.addEventListener('click', ()=>{
        chips.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));
        el.classList.add('on');
        if(inp) inp.value = '';
        setVal(ch);
      });
      chips.appendChild(el);
      if(i===0){ el.classList.add('on'); setVal(ch); }
    });
    box.appendChild(chips);
    let inp = null;
    if(slot.free){
      inp = document.createElement('input');
      inp.className = 'free-in'; inp.maxLength = 40;
      inp.placeholder = '직접 입력 (영어로) — 예: '+chipEn(slot.chips[0]);
      inp.addEventListener('input', ()=>{
        const v = clean(inp.value);
        if(v){
          chips.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));
          setVal({en:v, ko:v});
        } else {
          chips.querySelector('.chip').classList.add('on');
          setVal(slot.chips[0]);
        }
      });
      box.appendChild(inp);
    }
    box.appendChild(enLine);
    area.appendChild(box);
  });
  $('#makeFoot').style.display = '';
  area.scrollIntoView({behavior:'smooth', block:'start'});
}
const DISTRACTORS = SESSIONS.flatMap(s=>s.exps.map(x=>x.en));
function autoQuiz(exps){
  return exps.slice(0,2).map(x=>{
    const wrong = DISTRACTORS.filter(d=>d!==x.en).sort(()=>Math.random()-.5).slice(0,2);
    const c = [x.en, ...wrong].sort(()=>Math.random()-.5);
    return {q:`"${x.ko.replace(/\.$/,'')}"를 영어로 하면?`, c, a:c.indexOf(x.en)};
  });
}
$('#btnBuild').addEventListener('click', ()=>{
  if(!makeArch){ toast('상황을 먼저 골라주세요'); return; }
  const t = clean($('#makeTitle').value).slice(0,24);
  const s = makeArch.build(makeVals, t || '');
  s.id = 'c_' + Date.now().toString(36);
  s.tag = '나만의';
  s.desc = s.desc || makeArch.name + ' · 직접 만든 상황';
  s.quiz = autoQuiz(s.exps);
  customs.push(s);
  store.set('custom', customs);
  toast('나만의 세션이 만들어졌어요!');
  openSession(s);
});

/* ================= SESSION PLAYER ================= */
const STEP_LABELS = ['STEP 1 · 오늘의 표현','STEP 2 · 대화 듣기','STEP 3 · 롤플레이','STEP 4 · 확인 퀴즈'];
let cur = null, step = 0, timerId = null, timeLeft = 300;

function openSession(s){
  cur = s; step = 0; timeLeft = 300;
  $('#sessTitle').textContent = s.title;
  show('sess');
  startTimer();
  renderStep();
}
function closeSession(){
  stopSpeak(); stopTimer();
  if(recog){ try{recog.abort();}catch(e){} recog = null; }
  show('home');
}
$('#btnClose').addEventListener('click', closeSession);

function startTimer(){
  stopTimer();
  const box = $('#timerBox'); box.classList.remove('over');
  updTimer();
  timerId = setInterval(()=>{
    timeLeft--;
    if(timeLeft<=0){ timeLeft=0; stopTimer(); box.classList.add('over'); toast('5분이 지났어요! 마무리해 볼까요?'); }
    updTimer();
  },1000);
}
function stopTimer(){ if(timerId){ clearInterval(timerId); timerId=null; } }
function updTimer(){
  const m = Math.floor(timeLeft/60), s = timeLeft%60;
  $('#timerTxt').textContent = m+':'+String(s).padStart(2,'0');
  const C = 69.1;
  $('#timerArc').setAttribute('stroke-dashoffset', String(C*(1-timeLeft/300)));
}

function renderStep(){
  stopSpeak();
  $$('#stepDots i').forEach((d,i)=>d.classList.toggle('on', i<=step));
  $('#stepLabel').textContent = STEP_LABELS[step] || '';
  const body = $('#sbody'), foot = $('#sfoot');
  body.innerHTML = ''; foot.innerHTML = '';
  if(step===0) renderExps(body, foot);
  else if(step===1) renderDialogue(body, foot);
  else if(step===2) renderRoleplay(body, foot);
  else if(step===3) renderQuiz(body, foot);
  else renderDone(body, foot);
  window.scrollTo(0,0);
}
function footNext(label, fn){
  const b = document.createElement('button');
  b.className='btn-main'; b.textContent = label;
  b.addEventListener('click', ()=>{ stopSpeak(); fn(); });
  $('#sfoot').appendChild(b);
  return b;
}

/* ---- step 0: expressions ---- */
function renderExps(body){
  cur.exps.forEach(x=>{
    const c = document.createElement('div');
    c.className='expcard';
    c.innerHTML = `<div class="exp-en">${x.en}</div>
      <div class="exp-ko">${x.ko}</div>
      <div class="exp-note">${x.note}</div>
      <div class="exp-ex"><div class="en">${x.ex.en}</div><div class="ko">${x.ex.ko}</div></div>`;
    const btn = document.createElement('button');
    btn.className='btn-listen';
    btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg> 듣기';
    btn.addEventListener('click', ()=>{
      $$('.btn-listen').forEach(b=>b.classList.remove('playing'));
      btn.classList.add('playing');
      speak(x.en, ()=>btn.classList.remove('playing'));
    });
    c.appendChild(btn);
    body.appendChild(c);
  });
  footNext('대화 들으러 가기', ()=>{ step=1; renderStep(); });
}

/* ---- step 1: dialogue ---- */
let playing = false;
function renderDialogue(body){
  const chat = document.createElement('div'); chat.className='chat';
  const wrap = document.createElement('div'); wrap.className='playall';
  const pb = document.createElement('button');
  const pbReset = ()=>{ pb.classList.remove('playing'); pb.innerHTML = playIcon()+' 전체 듣기'; };
  cur.dlg.forEach((t,i)=>{
    const m = document.createElement('div');
    m.className = 'msg '+t.w;
    m.innerHTML = `<span class="who">${t.w==='e'?'SUNNY':'YOU'}</span>
      <span class="bubble">${t.en}</span>
      ${showKo? `<span class="ko">${t.ko}</span>` : ''}`;
    m.querySelector('.bubble').addEventListener('click', ()=>{
      playing=false; pbReset(); markSpeaking(i);
      speak(t.en, ()=>markSpeaking(-1));
    });
    chat.appendChild(m);
  });
  body.appendChild(chat);

  pb.innerHTML = playIcon()+' 전체 듣기';
  pb.addEventListener('click', ()=>{
    if(playing){ playing=false; stopSpeak(); markSpeaking(-1); pb.classList.remove('playing'); pb.innerHTML = playIcon()+' 전체 듣기'; return; }
    playing = true; pb.classList.add('playing'); pb.innerHTML = stopIcon()+' 정지';
    let i = 0;
    const next = ()=>{
      if(!playing || i>=cur.dlg.length){
        playing=false; markSpeaking(-1); pb.classList.remove('playing'); pb.innerHTML = playIcon()+' 전체 듣기'; return;
      }
      markSpeaking(i);
      speak(cur.dlg[i].en, ()=>{ i++; setTimeout(next, 350); });
    };
    next();
  });
  wrap.appendChild(pb); body.appendChild(wrap);

  footNext('롤플레이 도전하기', ()=>{ playing=false; step=2; renderStep(); });
}
function markSpeaking(i){
  $$('.chat .msg').forEach((m,j)=>{
    m.classList.toggle('speaking', j===i);
    if(j===i) m.scrollIntoView({block:'center', behavior:'smooth'});
  });
}
function playIcon(){ return '<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>'; }
function stopIcon(){ return '<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>'; }

/* ---- step 2: roleplay ---- */
let rpIdx = 0, recog = null;
function renderRoleplay(body, foot){
  rpIdx = 0;
  const hint = document.createElement('p');
  hint.className='rp-hint';
  hint.textContent = 'Sunny의 말을 듣고, 당신 차례가 되면 한국어 뜻을 보고 영어로 말해 보세요.';
  body.appendChild(hint);
  const stage = document.createElement('div'); stage.className='rp-stage'; stage.id='rpStage';
  body.appendChild(stage);
  rpAdvance(stage);
}
function rpAdvance(stage){
  if(rpIdx >= cur.dlg.length){
    $('#sfoot').innerHTML='';
    footNext('퀴즈 풀러 가기', ()=>{ step=3; renderStep(); });
    toast('롤플레이 완료! 잘했어요');
    return;
  }
  const t = cur.dlg[rpIdx];
  if(t.w==='e'){
    const m = document.createElement('div');
    m.className='msg e';
    m.style.maxWidth='100%';
    m.innerHTML = `<span class="who">SUNNY</span><span class="bubble">${t.en}</span>
      ${showKo? `<span class="ko">${t.ko}</span>` : ''}`;
    m.querySelector('.bubble').addEventListener('click', ()=>speak(t.en));
    stage.appendChild(m);
    m.scrollIntoView({block:'center', behavior:'smooth'});
    speak(t.en, ()=>{ rpIdx++; rpAdvance(stage); });
  } else {
    const card = document.createElement('div');
    card.className='rp-you';
    card.innerHTML = `<div class="lab">YOUR TURN — 영어로 말해 보세요</div>
      <div class="rp-ko">${t.ko}</div>
      <div class="rp-en">${t.en}</div>
      <div class="rp-acts"></div>
      <div class="rp-fb"></div>`;
    const acts = card.querySelector('.rp-acts');
    const fb = card.querySelector('.rp-fb');

    if(SR){
      const mic = document.createElement('button');
      mic.className='chipbtn rec';
      mic.textContent='말하기';
      mic.addEventListener('click', ()=>{
        if(recog){ try{recog.abort();}catch(e){} recog=null; mic.classList.remove('live'); mic.textContent='말하기'; return; }
        stopSpeak();
        recog = new SR();
        recog.lang='en-US'; recog.interimResults=false; recog.maxAlternatives=1;
        mic.classList.add('live'); mic.textContent='듣는 중…';
        recog.onresult = e=>{
          const said = e.results[0][0].transcript;
          const score = matchScore(said, t.en);
          card.classList.add('revealed');
          if(score>=0.6){ fb.className='rp-fb good'; fb.innerHTML=`좋아요! 아주 잘했어요 <span class="rp-heard">들린 말: “${said}”</span>`; }
          else { fb.className='rp-fb retry'; fb.innerHTML=`조금만 더! 정답을 보고 다시 말해 보세요 <span class="rp-heard">들린 말: “${said}”</span>`; }
        };
        recog.onend = ()=>{ recog=null; mic.classList.remove('live'); mic.textContent='말하기'; };
        recog.onerror = ()=>{ recog=null; mic.classList.remove('live'); mic.textContent='말하기'; };
        try{ recog.start(); }catch(e){ recog=null; mic.classList.remove('live'); mic.textContent='말하기'; }
      });
      acts.appendChild(mic);
    }

    const rev = document.createElement('button');
    rev.className='chipbtn'; rev.textContent='정답 보기';
    rev.addEventListener('click', ()=>{ card.classList.add('revealed'); speak(t.en); });
    acts.appendChild(rev);

    const nxt = document.createElement('button');
    nxt.className='chipbtn primary'; nxt.textContent='다음';
    nxt.addEventListener('click', ()=>{
      if(recog){ try{recog.abort();}catch(e){} recog=null; }
      card.classList.add('revealed');
      card.querySelectorAll('button').forEach(b=>b.disabled=true);
      card.style.opacity='.75'; card.style.borderColor='var(--line)';
      rpIdx++; rpAdvance(stage);
    });
    acts.appendChild(nxt);

    stage.appendChild(card);
    card.scrollIntoView({block:'center', behavior:'smooth'});
  }
}
function matchScore(said, target){
  const norm = s => s.toLowerCase().replace(/[^a-z' ]/g,' ').split(/\s+/).filter(Boolean);
  const a = norm(said), b = norm(target);
  if(!b.length) return 0;
  const setA = new Set(a);
  let hit = 0; b.forEach(w=>{ if(setA.has(w)) hit++; });
  return hit/b.length;
}

/* ---- step 3: quiz ---- */
let qIdx = 0, qOk = 0;
function renderQuiz(body){
  qIdx = 0; qOk = 0;
  drawQuiz(body);
}
function drawQuiz(body){
  body.innerHTML = '';
  const q = cur.quiz[qIdx];
  const prog = document.createElement('div');
  prog.className='qz-prog'; prog.textContent = `${qIdx+1} / ${cur.quiz.length}`;
  body.appendChild(prog);
  const qq = document.createElement('div'); qq.className='qz-q'; qq.textContent = q.q;
  body.appendChild(qq);
  const opts = document.createElement('div'); opts.className='qz-opts';
  q.c.forEach((c,i)=>{
    const o = document.createElement('button');
    o.className='qz-opt'; o.textContent = c;
    o.addEventListener('click', ()=>{
      if(opts.dataset.lock) return;
      opts.dataset.lock='1';
      if(i===q.a){ o.classList.add('ok'); qOk++; }
      else{ o.classList.add('no'); opts.children[q.a].classList.add('ok'); }
      setTimeout(()=>{
        qIdx++;
        if(qIdx < cur.quiz.length) drawQuiz(body);
        else { step=4; renderStep(); }
      }, 900);
    });
    opts.appendChild(o);
  });
  body.appendChild(opts);
  $('#sfoot').innerHTML='';
}

/* ---- step 4: done ---- */
function renderDone(body){
  stopTimer();
  const first = !doneIds.includes(cur.id);
  if(first){
    doneIds.push(cur.id); store.set('done', doneIds);
    cur.exps.forEach(x=>{
      if(!learned.some(l=>l.en===x.en)) learned.push({sid:cur.id, stitle:cur.title, en:x.en, ko:x.ko});
    });
    store.set('learned', learned);
    const today = new Date().toDateString();
    if(lastDay !== today){
      const y = new Date(Date.now()-864e5).toDateString();
      streak = (lastDay===y) ? streak+1 : 1;
      lastDay = today;
      store.set('streak', streak); store.set('lastDay', lastDay);
    }
  }
  const wrap = document.createElement('div'); wrap.className='done-wrap';
  wrap.innerHTML = `
    <img class="done-emma" src="${SUNNY_IDLE}" alt="인사하는 Sunny">
    <div class="done-t">오늘의 5분, 완료!</div>
    <div class="done-d">퀴즈 ${qOk}/${cur.quiz.length} 정답 · 표현 ${cur.exps.length}개를 복습 노트에 저장했어요</div>
    <div class="done-exps">
      ${cur.exps.map(x=>`<div class="en">${x.en}</div><div class="ko">${x.ko}</div>`).join('')}
    </div>`;
  body.appendChild(wrap);
  footNext('홈으로', closeSession);
}

/* ================= REVIEW ================= */
function renderReview(){
  const el = $('#revBody'); el.innerHTML='';
  if(!learned.length){
    el.innerHTML = '<div class="rev-empty">아직 저장된 표현이 없어요.<br>세션을 완료하면 배운 표현이 여기에 모여요.</div>';
    return;
  }
  const bySess = {};
  learned.forEach(l=>{ (bySess[l.sid] = bySess[l.sid]||[]).push(l); });
  Object.keys(bySess).forEach(sid=>{
    const s = findSession(sid);
    const g = document.createElement('div'); g.className='rev-group';
    g.innerHTML = `<h3>${s ? s.title : (bySess[sid][0].stitle || '나만의 상황')}</h3>`;
    bySess[sid].forEach(l=>{
      const it = document.createElement('button');
      it.className='rev-item';
      it.innerHTML = `<span><span class="en">${l.en}</span><br><span class="ko">${l.ko}</span></span>
        <span class="rev-play"><svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg></span>`;
      it.addEventListener('click', ()=>speak(l.en));
      g.appendChild(it);
    });
    el.appendChild(g);
  });
}

/* ================= SETTINGS ================= */
$('#tglKo').addEventListener('click', ()=>{
  showKo = !showKo; store.set('showKo', showKo);
  const t = $('#tglKo');
  t.classList.toggle('on', showKo);
  t.setAttribute('aria-checked', String(showKo));
});
$$('#segRate button').forEach(b=>{
  if(Math.abs(parseFloat(b.dataset.r)-rate)<0.01){ $$('#segRate button').forEach(x=>x.classList.remove('on')); b.classList.add('on'); }
  b.addEventListener('click', ()=>{
    rate = parseFloat(b.dataset.r); store.set('rate', rate);
    $$('#segRate button').forEach(x=>x.classList.remove('on')); b.classList.add('on');
    speak('Hello! This is my speaking speed.');
  });
});
$('#voiceSel').addEventListener('change', e=>{
  voiceName = e.target.value; store.set('voice', voiceName);
  speak("Hi, I'm Sunny. Nice to meet you!");
});
let resetArmed = null;
$('#btnReset').addEventListener('click', ()=>{
  const b = $('#btnReset');
  if(!resetArmed){
    b.textContent = '한 번 더 누르면 모두 지워져요';
    resetArmed = setTimeout(()=>{ resetArmed=null; b.textContent='학습 기록 초기화'; }, 3000);
    return;
  }
  clearTimeout(resetArmed); resetArmed = null;
  b.textContent = '학습 기록 초기화';
  doneIds=[]; learned=[]; streak=0; lastDay='';
  store.set('done',[]); store.set('learned',[]); store.set('streak',0); store.set('lastDay','');
  toast('기록을 초기화했어요');
  renderHome();
});

/* init toggle state from storage */
(function(){
  const t = $('#tglKo');
  t.classList.toggle('on', showKo);
  t.setAttribute('aria-checked', String(showKo));
})();

renderHome();
</script>
